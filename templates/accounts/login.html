{% extends "base.html" %}

{% block title %}ログイン — 顧客管理システム{% endblock %}

{% block auth_content %}
<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg overflow-hidden">
    <div class="bg-indigo-950 px-6 py-4 flex items-center justify-between">
      <span class="text-indigo-300 text-xs">顧客管理システム</span>
      <span class="text-indigo-400 text-xs">localhost:8000</span>
    </div>
    <div class="px-8 py-10">
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-3">👥</div>
        <h2 class="text-xl font-bold text-gray-900">顧客管理システム</h2>
        <p class="text-sm text-gray-500 mt-1">ログインしてください</p>
      </div>

      <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
        <div class="mb-4 px-3 py-2 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
          メールアドレスまたはパスワードが正しくありません
        </div>
        {% endif %}

        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">メールアドレス</label>
          <input type="email" name="username" value="{{ form.username.value|default:'' }}"
            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none focus:border-indigo-500 focus:bg-white"
            placeholder="example@email.com" autofocus>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">パスワード</label>
          <input type="password" name="password"
            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none focus:border-indigo-500 focus:bg-white"
            placeholder="••••••••">
        </div>
        <button type="submit"
          class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-lg text-sm hover:from-indigo-700 hover:to-purple-700 transition">
          ログイン
        </button>
      </form>

      <p class="text-center text-xs text-gray-400 mt-6">© 2026 顧客管理システム</p>
    </div>
  </div>
</div>
{% endblock %}
